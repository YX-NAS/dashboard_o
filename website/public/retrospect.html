<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>红圈项目看板系统 - 复盘页面</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <div>
            <h1 class="page-title" id="projectName">红圈项目看板系统</h1>
            <div class="hero-meta" id="projectMeta"></div>
          </div>
          <nav class="nav-links">
            <a class="nav-link" href="/board.html">主看板</a>
            <a class="nav-link" href="/sprint.html">迭代详情</a>
            <a class="nav-link active" href="/retrospect.html">复盘页面</a>
          </nav>
        </div>
        <div class="topbar-right">
          <button class="secondary-button" id="logoutButton">退出登录</button>
        </div>
      </header>
      <main class="app-main">
        <section class="hero">
          <div>
            <h2 class="page-title">日报复盘</h2>
            <div class="hero-meta">聚焦当日工时偏差、填报情况和风险建议。</div>
          </div>
        </section>

        <section class="panel" style="margin-bottom: 24px;">
          <h2>复盘摘要</h2>
          <div id="summaryList" class="summary-list"></div>
        </section>

        <section class="grid two-column">
          <article class="panel">
            <h2>团队回顾</h2>
            <div id="timeline" class="timeline"></div>
          </article>
          <article class="panel">
            <h2>重点风险</h2>
            <div id="riskList" class="risk-list"></div>
          </article>
        </section>
      </main>
    </div>
    <script src="/assets/shared.js"></script>
    <script src="/assets/retrospect.js"></script>
  </body>
</html>
